version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: stocksmith
    main: ./cmd/stocksmith
    binary: stocksmith
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "stocksmith_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "stocksmith_{{.Version}}_checksums.txt"
  algorithm: sha256

brews:
  - name: stocksmith
    repository:
      owner: craftybase
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://cli.stocksmith.dev"
    description: "Official CLI for the Stocksmith Public API"
    install: |
      bin.install "stocksmith"
    test: |
      system "#{bin}/stocksmith version"

release:
  github:
    owner: craftybase
    name: stocksmith-cli
